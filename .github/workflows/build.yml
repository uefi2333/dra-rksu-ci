name: Build DRA-AL00 Kernel with ReSukiSU

on:
  workflow_dispatch:
    inputs:
      resukisu_ref:
        description: 'ReSukiSU tag/branch (main recommended)'
        required: false
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    env:
      KERNEL_REPO: https://github.com/paperluigis/android-huawei-dura-kernel
      KERNEL_BRANCH: og
      DEFCONFIG: dura64_defconfig
      BOARD_DEFCONFIG: dura64_board_AL00A_defconfig
      ARCH: arm64
      RESUKISU_REPO: https://github.com/ReSukiSU/ReSukiSU
      RESUKISU_REF: ${{ github.event.inputs.resukisu_ref || 'main' }}

    steps:
      - name: Checkout CI repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison flex libssl-dev make libc6-dev libncurses5-dev \
            gcc-aarch64-linux-gnu python3 git wget zip python2

      - name: Clone kernel source
        run: |
          git clone --depth=1 -b $KERNEL_BRANCH $KERNEL_REPO kernel
          cd kernel
          echo "Kernel: $(head -5 Makefile | tr '\n' ' ')"

      - name: Download GCC 4.9 toolchain
        run: |
          git clone --depth=1 https://github.com/KudProject/aarch64-linux-android-4.9 gcc49
          export PATH="$GITHUB_WORKSPACE/gcc49/bin:$PATH"
          aarch64-linux-android-gcc --version | head -1

      - name: Integrate ReSukiSU
        run: |
          cd kernel
          git clone --depth=1 $RESUKISU_REPO KernelSU
          cd KernelSU
          git fetch --depth=1 origin "$RESUKISU_REF" || true
          git checkout "$RESUKISU_REF" || git checkout FETCH_HEAD || true
          echo "ReSukiSU: $(git rev-parse --short HEAD) $(git describe --tags --always 2>/dev/null || true)"
          cd ..

          ln -sfn "$(realpath KernelSU/kernel)" drivers/kernelsu
          grep -q 'kernelsu/' drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          if ! grep -q 'drivers/kernelsu/Kconfig' drivers/Kconfig; then
            sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          fi
          test -f drivers/kernelsu/Kconfig
          test -f drivers/kernelsu/tools/static_export_check.mk
          echo "[+] ReSukiSU integrated"

      - name: Apply manual hooks + static exports
        run: |
          cd kernel
          bash "$GITHUB_WORKSPACE/patch_dra_hooks.sh"

      - name: Host/kernel build fixes (yylloc, C90, HOSTCFLAGS, MTK)
        run: |
          cd kernel
          # C90: ReSukiSU sources use decl-after-statement
          sed -i 's/-Wdeclaration-after-statement/-Wno-declaration-after-statement/g' Makefile
          # also prevent -Werror from turning return-type etc into hard fails on vendor drivers
          if ! grep -q 'Wno-error=return-type' Makefile; then
            sed -i 's/^KBUILD_CFLAGS :=/KBUILD_CFLAGS := -Wno-error=return-type -Wno-error=incompatible-pointer-types /' Makefile || true
          fi

          # dtc yylloc multi-def under modern host GCC (-fno-common)
          for f in scripts/dtc/dtc-lexer.l scripts/dtc/dtc-lexer.lex.c \
                   scripts/dtc/dtc-parser.y scripts/dtc/dtc-parser.tab.c; do
            [ -f "$f" ] || continue
            sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' "$f" || true
          done
          if grep -q 'extern YYLTYPE yylloc' scripts/dtc/dtc-parser.tab.c 2>/dev/null; then
            sed -i '0,/extern YYLTYPE yylloc;/s//YYLTYPE yylloc;/' scripts/dtc/dtc-parser.tab.c || true
          fi
          if ! grep -q 'HOSTCFLAGS.*-fcommon' Makefile; then
            echo 'export HOSTCFLAGS += -fcommon' >> Makefile
          fi

          # MTK sched_ctl: sysctl_sched_migration_cost may be const/read-only
          # under some Huawei FINAL_RELEASE / constification patches.
          # RKSU green tree hit this too when KALLSYMS_ALL/FINAL_RELEASE combo differs.
          f=drivers/misc/mediatek/sched/sched_ctl.c
          if [ -f "$f" ]; then
            # cast away const on assignment sites
            sed -i 's/sysctl_sched_migration_cost = /*(unsigned int *)\&sysctl_sched_migration_cost = /g' "$f"
            # if already cast, don't double
            sed -i 's/\*(unsigned int \*)\&\*(unsigned int \*)\&/*(unsigned int *)\&/g' "$f"
            echo "[+] patched $f for migration_cost write"
            grep -n 'sysctl_sched_migration_cost' "$f" | head -10 || true
          fi

          # also un-const the kernel symbol if declared const (belt)
          for f in kernel/sched/core.c kernel/sched/fair.c; do
            [ -f "$f" ] || continue
            sed -i 's/^const unsigned int sysctl_sched_migration_cost/unsigned int sysctl_sched_migration_cost/' "$f" || true
            sed -i 's/^static const unsigned int sysctl_sched_migration_cost/unsigned int sysctl_sched_migration_cost/' "$f" || true
          done

          echo "[+] host/kernel flag + MTK fixes"

      - name: Configure kernel
        run: |
          cd kernel
          export ARCH=arm64
          export CROSS_COMPILE="$GITHUB_WORKSPACE/gcc49/bin/aarch64-linux-android-"

          make O=out python=python2 $DEFCONFIG

          if [ -f "arch/arm64/configs/$BOARD_DEFCONFIG" ]; then
            scripts/kconfig/merge_config.sh -m -O out out/.config "arch/arm64/configs/$BOARD_DEFCONFIG" 2>/dev/null || \
              cat "arch/arm64/configs/$BOARD_DEFCONFIG" >> out/.config
          fi

          # HARD stock-align for WiFi/USB/battery (match stock ikconfig).
          # Rule: never re-run olddefconfig AFTER the final sed kill.
          scripts/config --file out/.config \
            --enable HZ_300 --disable HZ_250 --disable HZ_100 --disable HZ_1000 --set-val HZ 300 \
            --enable FINAL_RELEASE \
            --disable SCHED_DEBUG --disable DYNAMIC_DEBUG --disable CGROUP_DEBUG --disable CMA_DEBUG \
            --disable SND_DEBUG --disable SND_DEBUG_VERBOSE --disable SND_PCM_XRUN_DEBUG \
            --disable MMC_BLOCK_IO_LOG --disable MTK_BLOCK_TAG \
            --disable MTK_LOCK_DEBUG --disable MTK_CPU_HOTPLUG_DEBUG_0 \
            --disable MTK_CPU_HOTPLUG_DEBUG_2 --disable MTK_CPU_HOTPLUG_DEBUG_3 \
            --disable SECURITY_SELINUX_DEVELOP \
            --set-val LOG_BUF_SHIFT 19 \
            --disable MMC_FFU \
            --disable HUAWEI_VIRT_TO_PHYS --disable HUAWEI_TS_KIT_TEST \
            --disable SW_BRAND_HONOR --disable SW_BRAND_HUAWEI || true

          # ReSukiSU core only
          scripts/config --file out/.config \
            --enable KSU \
            --enable KSU_MANUAL_HOOK \
            --disable KSU_TRACEPOINT_HOOK \
            --disable KSU_SUSFS \
            --disable KSU_DEBUG \
            --disable KPROBES \
            --enable KALLSYMS \
            --enable KALLSYMS_ALL \
            --enable KSU_MULTI_MANAGER_SUPPORT \
            --enable KSU_MANUAL_HOOK_AUTO_SETUID_HOOK \
            --enable KSU_MANUAL_HOOK_AUTO_INITRC_HOOK \
            --enable KSU_MANUAL_HOOK_AUTO_INPUT_HOOK \
            --enable NAMESPACES --enable NET_NS --enable PID_NS --enable USER_NS --enable UTS_NS \
            --disable HW_ROOT_SCAN \
            --enable OVERLAY_FS || true

          # stock camera list (DRA-AL00A has extra sensors vs board fragment)
          scripts/config --file out/.config \
            --set-str CUSTOM_KERNEL_IMGSENSOR "hi1333_mipi_raw s5k3l6_mipi_raw s5k3l6mam_mipi_raw ov13855_mipi_raw hi846_mipi_raw ov8856_mipi_raw gc8034_mipi_raw gc8034a_mipi_raw hi556_mipi_raw gc5025a_mipi_raw gc5025h_mipi_raw gc5025aw_mipi_raw ov5675_mipi_raw s5k5e9yx_mipi_raw" || true

          make O=out ARCH=arm64 python=python2 olddefconfig

          # second pass after olddefconfig
          scripts/config --file out/.config \
            --enable HZ_300 --disable HZ_250 --set-val HZ 300 \
            --enable FINAL_RELEASE \
            --disable CMA_DEBUG --disable DYNAMIC_DEBUG --disable SCHED_DEBUG \
            --disable SND_DEBUG --disable SND_DEBUG_VERBOSE --disable MMC_BLOCK_IO_LOG \
            --disable MMC_FFU --disable MTK_BLOCK_TAG \
            --disable HUAWEI_VIRT_TO_PHYS --disable HUAWEI_TS_KIT_TEST \
            --enable KSU --enable KSU_MANUAL_HOOK --disable KSU_TRACEPOINT_HOOK \
            --enable KALLSYMS --enable KALLSYMS_ALL || true
          make O=out ARCH=arm64 python=python2 olddefconfig

          # FINAL kill — sed only, NO olddefconfig after this (olddefconfig revives CMA_DEBUG)
          kill_off() {
            local off="$1"
            sed -i "s/^CONFIG_${off}=y/# CONFIG_${off} is not set/" out/.config || true
            sed -i "s/^CONFIG_${off}=m/# CONFIG_${off} is not set/" out/.config || true
            if ! grep -q "^# CONFIG_${off} is not set" out/.config && ! grep -q "^CONFIG_${off}=" out/.config; then
              echo "# CONFIG_${off} is not set" >> out/.config
            fi
          }
          for off in CMA_DEBUG CMA_DEBUGFS DYNAMIC_DEBUG SCHED_DEBUG CGROUP_DEBUG \
                     SND_DEBUG SND_DEBUG_VERBOSE SND_PCM_XRUN_DEBUG \
                     MMC_BLOCK_IO_LOG MMC_FFU MTK_BLOCK_TAG \
                     HUAWEI_VIRT_TO_PHYS HUAWEI_TS_KIT_TEST \
                     MTK_LOCK_DEBUG MTK_CPU_HOTPLUG_DEBUG_0 MTK_CPU_HOTPLUG_DEBUG_2 MTK_CPU_HOTPLUG_DEBUG_3 \
                     SECURITY_SELINUX_DEVELOP; do
            kill_off "$off"
          done
          # keep required ons
          scripts/config --file out/.config \
            --enable HZ_300 --disable HZ_250 --set-val HZ 300 \
            --enable FINAL_RELEASE \
            --enable KSU --enable KSU_MANUAL_HOOK --enable KALLSYMS_ALL || true
          for off in CMA_DEBUG MMC_FFU HUAWEI_VIRT_TO_PHYS HUAWEI_TS_KIT_TEST MTK_BLOCK_TAG DYNAMIC_DEBUG; do
            kill_off "$off"
          done

          # prevent silent reconf during build (dirs may not exist yet)
          mkdir -p out/include/config out/include/generated
          touch out/.config
          # do not invent auto.conf if kbuild has not generated it; just ensure parent exists
          if [ -f out/include/config/auto.conf ]; then
            touch out/include/config/auto.conf
          fi
          if [ -f out/include/generated/autoconf.h ]; then
            for off in CMA_DEBUG MMC_FFU HUAWEI_VIRT_TO_PHYS HUAWEI_TS_KIT_TEST MTK_BLOCK_TAG; do
              sed -i "/#define CONFIG_${off} /d" out/include/generated/autoconf.h || true
            done
          fi

          echo "=== Config check (final, no olddefconfig after) ==="
          for cfg in KSU KSU_MANUAL_HOOK KALLSYMS_ALL HZ HZ_300 FINAL_RELEASE \
                     CMA_DEBUG MMC_FFU MTK_BLOCK_TAG HUAWEI_VIRT_TO_PHYS HUAWEI_TS_KIT_TEST \
                     CUSTOM_KERNEL_IMGSENSOR WLAN USB_GADGET MTK_SMART_BATTERY; do
            grep "CONFIG_${cfg}" out/.config || echo "CONFIG_${cfg} not found"
          done

          grep -q '^CONFIG_KSU=y' out/.config
          grep -q '^CONFIG_KSU_MANUAL_HOOK=y' out/.config
          grep -q '^CONFIG_KALLSYMS_ALL=y' out/.config
          grep -q '^CONFIG_HZ=300' out/.config
          grep -q '^CONFIG_FINAL_RELEASE=y' out/.config
          if grep -q '^CONFIG_CMA_DEBUG=y' out/.config; then echo "FATAL CMA_DEBUG still on"; exit 1; fi
          if grep -q '^CONFIG_MMC_FFU=y' out/.config; then echo "FATAL MMC_FFU still on"; exit 1; fi
          if grep -q '^CONFIG_HUAWEI_VIRT_TO_PHYS=y' out/.config; then echo "FATAL HUAWEI_VIRT still on"; exit 1; fi

      - name: Force python2 for MTK host scripts
        run: |
          bash "$GITHUB_WORKSPACE/fix_mtk_python.sh"

      - name: Build kernel
        run: |
          cd kernel
          # pre-build config freeze (olddefconfig must not run)
          for off in CMA_DEBUG MMC_FFU HUAWEI_VIRT_TO_PHYS HUAWEI_TS_KIT_TEST MTK_BLOCK_TAG DYNAMIC_DEBUG; do
            sed -i "s/^CONFIG_${off}=y/# CONFIG_${off} is not set/" out/.config || true
          done
          echo "pre-build CMA_DEBUG=$(grep CMA_DEBUG out/.config || true)"
          export ARCH=arm64
          export CROSS_COMPILE="$GITHUB_WORKSPACE/gcc49/bin/aarch64-linux-android-"
          export PATH="$GITHUB_WORKSPACE/bin:$GITHUB_WORKSPACE/gcc49/bin:$PATH"
          export HOSTCFLAGS="-fcommon"
          for f in scripts/dtc/dtc-lexer.l scripts/dtc/dtc-lexer.lex.c; do
            [ -f "$f" ] && sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' "$f" || true
          done
          # keep build going past unrelated driver warnings; fail on real errors
          make O=out ARCH=arm64 CROSS_COMPILE="$CROSS_COMPILE" HOSTCFLAGS="-fcommon" python=python2 -j"$(nproc)" Image
          test -f out/arch/arm64/boot/Image
          ls -la out/arch/arm64/boot/Image

      - name: Package kernel image
        run: |
          mkdir -p output
          cd kernel/out/arch/arm64/boot
          for img in Image.gz-dtb Image.gz Image; do
            [ -f "$img" ] && cp "$img" "$GITHUB_WORKSPACE/output/" && echo "Packaged $img"
          done
          find . -name '*.dtb' -exec cp {} "$GITHUB_WORKSPACE/output/" \; 2>/dev/null || true
          {
            echo "RESUKISU_REF=$RESUKISU_REF"
            (cd "$GITHUB_WORKSPACE/kernel/KernelSU" && git rev-parse HEAD && git describe --tags --always)
          } > "$GITHUB_WORKSPACE/output/build-info.txt"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DRA-ReSukiSU-kernel
          path: output/

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: resukisu-${{ github.run_number }}
          name: "DRA-AL00 ReSukiSU Build #${{ github.run_number }}"
          body: |
            DRA-AL00 (MT6739) 4.4.95 + ReSukiSU @ ${{ env.RESUKISU_REF }}
            - MANUAL_HOOK + AUTO setuid/initrc/input
            - KALLSYMS_ALL=y + static exports
            - HZ=300 FINAL_RELEASE stock-align v2 (CMA_DEBUG/MMC_FFU/HUAWEI_VIRT killed post-olddefconfig)
            - multi-manager support
          files: output/*
