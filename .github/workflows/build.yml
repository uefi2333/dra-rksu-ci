name: Build DRA-AL00 Kernel with ReSukiSU

on:
  workflow_dispatch:
    inputs:
      resukisu_ref:
        description: 'ReSukiSU tag/branch (main recommended for latest manager)'
        required: false
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    env:
      KERNEL_REPO: https://github.com/paperluigis/android-huawei-dura-kernel
      KERNEL_BRANCH: og
      DEFCONFIG: dura64_defconfig
      BOARD_DEFCONFIG: dura64_board_AL00A_defconfig
      ARCH: arm64
      RESUKISU_REPO: https://github.com/ReSukiSU/ReSukiSU
      RESUKISU_REF: ${{ github.event.inputs.resukisu_ref || 'main' }}

    steps:
      - name: Checkout CI repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison flex libssl-dev make libc6-dev libncurses5-dev \
            gcc-aarch64-linux-gnu python3 git wget zip python2

      - name: Clone kernel source
        run: |
          git clone --depth=1 -b $KERNEL_BRANCH $KERNEL_REPO kernel
          cd kernel
          echo "Kernel version: $(head -5 Makefile | grep -E 'VERSION|PATCHLEVEL|SUBLEVEL' | tr '\n' ' ')"

      - name: Download GCC 4.9 toolchain
        run: |
          git clone --depth=1 https://github.com/KudProject/aarch64-linux-android-4.9 gcc49
          export PATH="$GITHUB_WORKSPACE/gcc49/bin:$PATH"
          aarch64-linux-android-gcc --version | head -1

      - name: Integrate ReSukiSU
        run: |
          cd kernel
          git clone --depth=1 $RESUKISU_REPO KernelSU
          cd KernelSU
          git fetch --depth=1 origin $RESUKISU_REF || true
          git checkout $RESUKISU_REF || git checkout FETCH_HEAD || true
          echo "ReSukiSU ref: $(git rev-parse --short HEAD) $(git describe --tags --always 2>/dev/null || true)"
          cd ..

          # Symlink drivers/kernelsu -> KernelSU/kernel
          ln -sfn "$(realpath KernelSU/kernel)" drivers/kernelsu

          # Makefile
          if ! grep -q 'kernelsu/' drivers/Makefile; then
            echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          fi

          # Kconfig source
          if ! grep -q 'drivers/kernelsu/Kconfig' drivers/Kconfig; then
            sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          fi

          # sanity
          test -f drivers/kernelsu/Kconfig
          ls -la drivers/kernelsu | head
          echo "[+] ReSukiSU integrated"

      - name: Apply manual hooks patch
        run: |
          cd kernel
          bash "$GITHUB_WORKSPACE/patch_dra_hooks.sh"

      - name: Suppress C90 declaration-after-statement error in kernel Makefile
        run: |
          cd kernel
          sed -i 's/-Wdeclaration-after-statement/-Wno-declaration-after-statement/g' Makefile
          grep -n "declaration-after-statement" Makefile || true
          echo "[+] Disabled -Wdeclaration-after-statement"

      - name: Fix host tool compatibility (GCC 11 vs 4.4 kernel)
        run: |
          cd kernel
          # modern host GCC defaults to -fno-common → yylloc multi-def in dtc
          # Fix both source and SHIPPED pregenerated files; force -fcommon as backup.
          for f in scripts/dtc/dtc-lexer.l scripts/dtc/dtc-lexer.lex.c                    scripts/dtc/dtc-parser.y scripts/dtc/dtc-parser.tab.c; do
            [ -f "$f" ] || continue
            sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' "$f" || true
            sed -i 's/^YYLTYPE yylloc =/extern YYLTYPE yylloc;\/\/ was /' "$f" || true
          done
          # ensure only one definition remains: put definition in parser tab if both became extern
          if ! grep -q '^YYLTYPE yylloc' scripts/dtc/dtc-parser.tab.c 2>/dev/null; then
            if grep -q 'extern YYLTYPE yylloc' scripts/dtc/dtc-parser.tab.c 2>/dev/null; then
              sed -i '0,/extern YYLTYPE yylloc;/s//YYLTYPE yylloc;/' scripts/dtc/dtc-parser.tab.c || true
            fi
          fi
          # HOSTCFLAGS -fcommon for all host tools
          if ! grep -q 'HOSTCFLAGS.*-fcommon' Makefile; then
            sed -i '/^HOSTCFLAGS/ s|$| -fcommon|' Makefile || true
            # also export for recursive makes
            echo 'export HOSTCFLAGS += -fcommon' >> Makefile
          fi
          grep -n 'yylloc' scripts/dtc/dtc-lexer.l scripts/dtc/dtc-lexer.lex.c scripts/dtc/dtc-parser.tab.c 2>/dev/null | head -20 || true
          echo "[+] dtc yylloc / -fcommon host fix applied"

      - name: Configure kernel
        run: |
          cd kernel
          export ARCH=arm64
          export CROSS_COMPILE="$GITHUB_WORKSPACE/gcc49/bin/aarch64-linux-android-"

          make O=out python=python2 $DEFCONFIG

          if [ -f "arch/arm64/configs/$BOARD_DEFCONFIG" ]; then
            scripts/kconfig/merge_config.sh -m -O out out/.config "arch/arm64/configs/$BOARD_DEFCONFIG" 2>/dev/null || \
            cat "arch/arm64/configs/$BOARD_DEFCONFIG" >> out/.config
          fi

          # Align to stock timing/flavor (WiFi/BT CONSYS is HZ-sensitive)
          scripts/config --file out/.config \
            --enable HZ_300 \
            --disable HZ_250 \
            --disable HZ_100 \
            --disable HZ_1000 \
            --set-val HZ 300 \
            --enable FINAL_RELEASE \
            --disable SCHED_DEBUG \
            --disable DYNAMIC_DEBUG \
            --disable CGROUP_DEBUG \
            --disable CMA_DEBUG \
            --disable SND_DEBUG \
            --disable SND_DEBUG_VERBOSE \
            --disable SND_PCM_XRUN_DEBUG \
            --disable MMC_BLOCK_IO_LOG \
            --disable MTK_LOCK_DEBUG \
            --disable MTK_CPU_HOTPLUG_DEBUG_0 \
            --disable MTK_CPU_HOTPLUG_DEBUG_2 \
            --disable MTK_CPU_HOTPLUG_DEBUG_3 \
            --disable SECURITY_SELINUX_DEVELOP \
            --set-val LOG_BUF_SHIFT 19

          # ReSukiSU: force manual hook path (4.4 cannot use GKI tracepoints)
          scripts/config --file out/.config \
            --enable KSU \
            --enable KSU_MANUAL_HOOK \
            --disable KSU_DEBUG \
            --disable KSU_TRACEPOINT_HOOK \
            --disable KSU_SUSFS \
            --disable KPROBES \
            --enable KALLSYMS \
            --disable KALLSYMS_ALL \
            --enable NAMESPACES \
            --enable NET_NS \
            --enable PID_NS \
            --enable USER_NS \
            --enable UTS_NS \
            --disable HW_ROOT_SCAN \
            --enable OVERLAY_FS \
            --enable KSU_MULTI_MANAGER_SUPPORT || true

          # optional configs may not exist on older Kconfig (v4.x); ignore failures
          scripts/config --file out/.config --disable KPM 2>/dev/null || true
          scripts/config --file out/.config --enable KSU_MANUAL_SU 2>/dev/null || true

          make O=out ARCH=arm64 python=python2 olddefconfig

          # Force HZ again after olddefconfig
          scripts/config --file out/.config --enable HZ_300 --disable HZ_250 --set-val HZ 300
          # Force manual hook again (choice can flip)
          scripts/config --file out/.config --enable KSU --enable KSU_MANUAL_HOOK --disable KSU_TRACEPOINT_HOOK 2>/dev/null || true
          make O=out ARCH=arm64 python=python2 olddefconfig

          echo "=== Config check ==="
          for cfg in KSU KSU_MANUAL_HOOK KSU_TRACEPOINT_HOOK KPROBES KALLSYMS_ALL NAMESPACES HW_ROOT_SCAN OVERLAY_FS HZ HZ_300 HZ_250 FINAL_RELEASE MTK_COMBO_WIFI MTK_COMBO_BT KSU_MULTI_MANAGER_SUPPORT; do
            grep "CONFIG_${cfg}" out/.config || echo "CONFIG_${cfg} not found"
          done

      - name: Force python2 for MTK host scripts
        run: |
          bash "$GITHUB_WORKSPACE/fix_mtk_python.sh"

      - name: Build kernel
        run: |
          cd kernel
          export ARCH=arm64
          export CROSS_COMPILE="$GITHUB_WORKSPACE/gcc49/bin/aarch64-linux-android-"
          export PATH="$GITHUB_WORKSPACE/bin:$GITHUB_WORKSPACE/gcc49/bin:$PATH"
          export HOSTCFLAGS="-fcommon"
          # re-apply yylloc fix in case SHIPPED regenerated earlier somehow
          for f in scripts/dtc/dtc-lexer.l scripts/dtc/dtc-lexer.lex.c; do
            [ -f "$f" ] && sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' "$f" || true
          done
          make O=out ARCH=arm64 CROSS_COMPILE="$CROSS_COMPILE" HOSTCFLAGS="-fcommon" python=python2 -j"$(nproc)" Image
          if [ -f out/arch/arm64/boot/Image ]; then
            echo "[+] Build SUCCESS: Image"
            ls -la out/arch/arm64/boot/Image
          else
            echo "[-] Build FAILED: no kernel image found"
            find out/arch/arm64/boot/ -type f 2>/dev/null || true
            exit 1
          fi

      - name: Package kernel image
        run: |
          mkdir -p output
          cd kernel/out/arch/arm64/boot
          for img in Image.gz-dtb Image.gz Image; do
            if [ -f "$img" ]; then
              cp "$img" "$GITHUB_WORKSPACE/output/"
              echo "Packaged: $img ($(stat -c%s "$img") bytes)"
            fi
          done
          find . -name '*.dtb' -exec cp {} "$GITHUB_WORKSPACE/output/" \; 2>/dev/null || true
          # stamp
          echo "ReSukiSU_REF=$RESUKISU_REF" > "$GITHUB_WORKSPACE/output/build-info.txt"
          (cd "$GITHUB_WORKSPACE/kernel/KernelSU" && git rev-parse HEAD && git describe --tags --always) >> "$GITHUB_WORKSPACE/output/build-info.txt" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DRA-ReSukiSU-kernel-${{ env.RESUKISU_REF }}
          path: output/

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: resukisu-${{ github.run_number }}
          name: "DRA-AL00 ReSukiSU Build #${{ github.run_number }}"
          body: |
            DRA-AL00 (MT6739) kernel 4.4.95 with ReSukiSU
            - Source: ReSukiSU/ReSukiSU @ ${{ env.RESUKISU_REF }}
            - Manual hook mode (no kprobes / no GKI tracepoints)
            - stock-align: HZ=300 FINAL_RELEASE=y
            - MULTI_MANAGER_SUPPORT if available
            - HW_ROOT_SCAN disabled, NAMESPACES + OVERLAY_FS enabled

            Use your ReSukiSU Manager APK with this kernel.
          files: output/*
