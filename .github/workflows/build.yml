name: Build DRA-AL00 Kernel with RKSU

on:
  workflow_dispatch:
    inputs:
      rksu_tag:
        description: 'RKSU tag/branch (e.g. v1.0.5-83-legacy)'
        required: false
        default: 'v1.0.5-83-legacy'
      build_mode:
        description: 'rksu | baseline (no RKSU, for boot bisect)'
        required: false
        default: 'rksu'

permissions:
  contents: write

env:
  KERNEL_REPO: https://github.com/paperluigis/android-huawei-dura-kernel
  KERNEL_BRANCH: og
  DEFCONFIG: dura64_defconfig
  BOARD_DEFCONFIG: dura64_board_AL00A_defconfig
  ARCH: arm64
  RKSU_REPO: https://github.com/rsuntk/KernelSU
  RKSU_TAG: ${{ github.event.inputs.rksu_tag || 'v1.0.5-83-legacy' }}
  BUILD_MODE: ${{ github.event.inputs.build_mode || 'rksu' }}

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout CI repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl wget tar xz-utils python2 python3 \
            bc bison flex libssl-dev make libc6-dev libncurses5-dev \
            zip unzip gcc g++ ccache device-tree-compiler

      - name: Clone kernel source
        run: |
          git clone --depth=1 -b "$KERNEL_BRANCH" "$KERNEL_REPO" kernel
          echo "[+] kernel @ $KERNEL_BRANCH"

      - name: Download GCC 4.9 toolchain
        run: |
          # Keep same aarch64-linux-android-4.9 path used by successful compile
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 gcc49 \
            || git clone --depth=1 https://github.com/rockchip-linux/prebuilts-gcc-linux-x86-aarch64-linux-android-4.9 gcc49
          ls gcc49/bin | head

      - name: Integrate RKSU
        if: env.BUILD_MODE == 'rksu'
        run: |
          git clone --depth=1 -b main $RKSU_REPO KernelSU
          cd KernelSU && git fetch --tags && git checkout $RKSU_TAG && cd ..
          ln -sf "$(realpath KernelSU/kernel)" kernel/drivers/kernelsu
          echo 'obj-$(CONFIG_KSU) += kernelsu/' >> kernel/drivers/Makefile
          sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' kernel/drivers/Kconfig
          echo "[+] RKSU integrated at $RKSU_TAG"

      - name: Apply manual hooks patch
        if: env.BUILD_MODE == 'rksu'
        working-directory: kernel
        run: bash "$GITHUB_WORKSPACE/patch_dra_hooks.sh"

      - name: Suppress C90 declaration-after-statement error in kernel Makefile
        working-directory: kernel
        run: |
          # 4.4 + modern host headers
          if grep -q 'Wno-declaration-after-statement' Makefile; then
            echo already
          else
            sed -i 's/KBUILD_CFLAGS[[:space:]]*:=.*/& -Wno-declaration-after-statement -Wno-error=declaration-after-statement/' Makefile || true
          fi

      - name: Fix host tool compatibility (GCC 11 vs 4.4 kernel)
        working-directory: kernel
        run: |
          # Fix dtc yylloc multiple definition (GCC 10+ -fno-common)
          if [ -f scripts/dtc/dtc-lexer.lex.c ]; then
            sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' scripts/dtc/dtc-lexer.lex.c || true
          fi
          if [ -f scripts/dtc/dtc-lexer.l ]; then
            sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' scripts/dtc/dtc-lexer.l || true
          fi
          export HOSTCFLAGS="-fcommon -Wno-error"
          echo "HOSTCFLAGS=$HOSTCFLAGS" >> "$GITHUB_ENV"

      - name: Configure kernel
        working-directory: kernel
        run: |
          export PATH="$GITHUB_WORKSPACE/gcc49/bin:$PATH"
          mkdir -p out
          make O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- python=python2 $DEFCONFIG
          if [ -f "arch/arm64/configs/$BOARD_DEFCONFIG" ]; then
            scripts/kconfig/merge_config.sh -m -O out out/.config "arch/arm64/configs/$BOARD_DEFCONFIG" 2>/dev/null || \
            cat "arch/arm64/configs/$BOARD_DEFCONFIG" >> out/.config
          fi

          if [ "$BUILD_MODE" = "rksu" ]; then
            scripts/config --file out/.config \
              --enable KSU \
              --enable KSU_MANUAL_HOOK \
              --disable KSU_DEBUG \
              --disable KPROBES \
              --enable KALLSYMS_ALL \
              --enable NAMESPACES \
              --disable HW_ROOT_SCAN \
              --enable OVERLAY_FS
          else
            # baseline: match stock more closely, no root hooks
            scripts/config --file out/.config \
              --disable KSU \
              --disable KSU_MANUAL_HOOK \
              --disable KPROBES \
              --disable KALLSYMS_ALL \
              --enable NAMESPACES \
              --disable HW_ROOT_SCAN \
              --enable OVERLAY_FS \
              --disable SECURITY_SELINUX_DEVELOP
          fi

          # Align a few stock-ish debug/security bits that can affect early boot policy path
          scripts/config --file out/.config --disable SECURITY_SELINUX_DEVELOP || true

          make O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- python=python2 olddefconfig

          echo "=== Config check ($BUILD_MODE) ==="
          for cfg in KSU KSU_MANUAL_HOOK KPROBES KALLSYMS_ALL NAMESPACES HW_ROOT_SCAN OVERLAY_FS SECURITY_SELINUX_DEVELOP; do
            grep -E "CONFIG_${cfg}[ =]" out/.config || echo "CONFIG_${cfg} missing"
          done

      - name: Force python2 for MTK host scripts
        run: bash "$GITHUB_WORKSPACE/fix_mtk_python.sh"

      - name: Build kernel
        working-directory: kernel
        run: |
          export PATH="$GITHUB_WORKSPACE/bin:$GITHUB_WORKSPACE/gcc49/bin:$PATH"
          make O=out \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-android- \
            python=python2 \
            -j"$(nproc)"

      - name: Package kernel image
        id: pkg
        working-directory: kernel
        run: |
          mkdir -p "$GITHUB_WORKSPACE/outpkg"
          if [ -f out/arch/arm64/boot/Image.gz-dtb ]; then
            cp out/arch/arm64/boot/Image.gz-dtb "$GITHUB_WORKSPACE/outpkg/"
          fi
          if [ -f out/arch/arm64/boot/Image.gz ]; then
            cp out/arch/arm64/boot/Image.gz "$GITHUB_WORKSPACE/outpkg/"
          fi
          if [ -f out/arch/arm64/boot/Image ]; then
            cp out/arch/arm64/boot/Image "$GITHUB_WORKSPACE/outpkg/"
          fi
          # collect dtbs
          find out/arch/arm64/boot/dts -name '*.dtb' -exec cp {} "$GITHUB_WORKSPACE/outpkg/" \; 2>/dev/null || true
          ls -la "$GITHUB_WORKSPACE/outpkg"
          echo "mode=$BUILD_MODE" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DRA-${{ env.BUILD_MODE }}-kernel-${{ env.RKSU_TAG }}
          path: outpkg/*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUILD_MODE }}-${{ env.RKSU_TAG }}-${{ github.run_number }}
          name: "DRA-AL00 ${{ env.BUILD_MODE }} ${{ env.RKSU_TAG }} Build #${{ github.run_number }}"
          body: |
            DRA-AL00 (MT6739) kernel 4.4.95
            mode=${{ env.BUILD_MODE }}
            rksu=${{ env.RKSU_TAG }}
            Infinite-reboot bisect build.
          files: outpkg/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
